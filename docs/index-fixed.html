<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海房地产数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;-webkit-font-smoothing:antialiased}

/* 头部 */
.header{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#3b82f6 100%);color:white;padding:20px 20px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(37,99,235,0.3)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:700;letter-spacing:0.5px}
.title span{font-size:14px;opacity:0.8;font-weight:400;display:block}
.subtitle{font-size:12px;opacity:0.7;margin-top:8px;display:block}

/* 容器 */
.container{max-width:1200px;margin:0 auto;padding:16px 16px 32px}

/* 维度切换 */
.dim-tabs{display:flex;gap:6px;margin:16px 0;background:white;border-radius:12px;padding:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);max-width:280px}
.dim-tab{flex:1;padding:8px 0;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#9ca3af;transition:all 0.2s}
.dim-tab.active{background:#2563eb;color:white;box-shadow:0 2px 8px rgba(37,99,235,0.3)}

/* 区块标题 */
.section-title{font-size:0;margin:0;padding:0;height:0;overflow:hidden;}

/* 卡片网格 */
.grid-row{display:grid;gap:12px;margin-bottom:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}

/* 统计卡片 */
.stat-card{background:white;border-radius:16px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.03);position:relative;overflow:hidden;transition:transform 0.15s}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.stat-card.blue::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.stat-card.green::before{background:linear-gradient(90deg,#10b981,#34d399)}
.stat-card.orange::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.stat-card.purple::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.stat-card.red::before{background:linear-gradient(90deg,#ef4444,#f87171)}
.stat-label{font-size:12px;color:#9ca3af;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:26px;font-weight:800;color:#111827;line-height:1.1;margin-bottom:6px}
.stat-unit{font-size:13px;font-weight:400;color:#9ca3af;margin-left:2px}
.stat-change{font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px}
.stat-change.up{color:#059669}
.stat-change.down{color:#dc2626}
.stat-change.neutral{color:#9ca3af}
.stat-extra{font-size:11px;color:#bfdbfe;background:rgba(59,130,246,0.08);padding:3px 8px;border-radius:6px;margin-top:8px;display:inline-block}

/* 区域卡片（二手房/一手房整体） */
.section-card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.03);margin-bottom:16px}
.section-card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f3f4f6}
.section-card-header .icon{font-size:22px}
.section-card-header .name{font-size:16px;font-weight:700;color:#1e3a8a}
.section-card-header .date{font-size:11px;color:#9ca3af;margin-left:auto}

/* 图表卡片 */
.chart-card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:16px;border:1px solid rgba(0,0,0,0.03);position:relative;overflow:hidden;}
.chart-card canvas{width:100% !important;height:260px !important;}
.chart-card-title{font-size:14px;font-weight:700;color:#1e3a8a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;align-items:start}

/* 表格 */
.table-wrap{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:16px;overflow-x:auto;border:1px solid rgba(0,0,0,0.03)}
.table-title{font-size:14px;font-weight:700;color:#1e3a8a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:10px 14px;text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #e2e8f0}
td{padding:10px 14px;text-align:right;border-bottom:1px solid #f1f5f9;font-variant-numeric:tabular-nums}
th:first-child,td:first-child{text-align:left}
tr:hover td{background:#f8fafc}
tr.latest td{background:#eff6ff;border-left:3px solid #3b82f6;font-weight:600}

/* 新楼盘表格 */
.presale-table{width:100%;border-collapse:collapse;font-size:13px}
.presale-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #e2e8f0}
.presale-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9}
.presale-table tr:hover td{background:#f0fdf4}
  /* 新楼盘认购信息（横向滚动） */
  .presale-scroll{overflow-x:auto;max-height:380px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.03);border-radius:12px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .presale-scroll table{font-size:12px;min-width:800px;}
  .presale-scroll th,.presale-scroll td{padding:8px 12px;white-space:nowrap;}
  

/* 页脚 */
.footer{text-align:center;font-size:12px;color:#94a3b8;padding:24px 0;border-top:1px solid #e2e8f0;margin-top:24px}
.footer a{color:#3b82f6;text-decoration:none;font-weight:500}

/* 加载态 */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:14px}

/* 移动端 */
@media(max-width:768px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .chart-row{grid-template-columns:1fr; min-height:220px}
  .stat-value{font-size:20px}
  .title{font-size:16px}
  .header{padding:14px 12px 16px}
  .container{padding:10px 8px 20px}
  .section-card{padding:14px}
  .chart-card{padding:14px 10px}
  .table-wrap, .presale-table{font-size:12px}
  th, td{padding:8px 6px !important}
}
@media(max-width:420px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .stat-label{font-size:11px}
  .stat-value{font-size:18px}
}

/* 没有数据 */
.empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}

</style>
</head>
<body>

<div id="app"><div class="loading">📊 正在加载数据...</div></div>

<script>
// ========== 数据将从 data.json 加载 ==========
let ALL_DATA = [];

// ========== 工具函数 ==========
function fmtNum(n) {
  return (n === null || n === undefined || isNaN(n)) ? '—' : Number(n).toLocaleString('zh-CN');
}

function fmtArea(n) {
  return (n === null || n === undefined || isNaN(n)) ? '—' : (Math.abs(n) >= 10000) ? (n / 10000).toFixed(2) + '万㎡' : Number(n).toLocaleString('zh-CN') + '㎡';
}

function fmtPct(a, b) {
  if (a === null || b === null || b === 0 || isNaN(a) || isNaN(b)) return null;
  return Math.round(((a - b) / b) * 1000) / 10;
}

function changeHtml(curr, prev) {
  const pct = fmtPct(curr, prev);
  if (pct === null) return '<span class="stat-change neutral">— 暂无</span>';
  const arrow = pct >= 0 ? '▲' : '▼';
  const cl = pct >= 0 ? 'up' : 'down';
  return '<span class="stat-change ' + cl + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span>';
}

function changeText(curr, prev) {
  const pct = fmtPct(curr, prev);
  if (pct === null) return '暂无';
  return (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
}

// ========== 聚合 ==========
function aggBy(arr, keyFn) {
  const m = {};
  arr.forEach(r => {
    const k = keyFn(r);
    if (!m[k]) m[k] = [];
    m[k].push(r);
  });
  return Object.keys(m).sort().map(k => {
    const d = m[k];
    const su = d.reduce((s, x) => s + (x.second_hand?.units || 0), 0);
    const sa = d.reduce((s, x) => s + (x.second_hand?.area || 0), 0);
    const nu = d.reduce((s, x) => s + (x.new_house?.units || 0), 0);
    const na = d.reduce((s, x) => s + (x.new_house?.area || 0), 0);
    const ps = d.flatMap(x => (x.presale || []));
    return {
      key: k,
      sh_u: su,
      sh_a: sa,
      sh_avg: su ? Math.round(sa / su * 100) / 100 : null,
      nh_u: nu,
      nh_a: na,
      nh_avg: nu ? Math.round(na / nu * 100) / 100 : null,
      presale: ps,
      presale_count: ps.length
    };
  });
}

function aggDaily(recs) {
  return recs.map(r => ({
    key: r.date,
    sh_u: r.second_hand?.units || 0,
    sh_a: r.second_hand?.area || 0,
    sh_avg: r.second_hand?.avg_area || null,
    nh_u: r.new_house?.units || 0,
    nh_a: r.new_house?.area || 0,
    nh_avg: r.new_house?.avg_area || null,
    presale: (r.presale || []),
    presale_count: (r.presale || []).length
  }));
}

// ========== 主渲染 ==========
let currentView = 'daily';

function render() {
  if (!ALL_DATA || ALL_DATA.length === 0) {
    document.getElementById('app').innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }

  const latest = ALL_DATA[ALL_DATA.length - 1];
  const prevDay = ALL_DATA.length >= 2 ? ALL_DATA[ALL_DATA.length - 2] : null;

  // 智能日期：08:30 之前显示 T-1日，之后显示 T日
  const now = new Date();
  const currentHour = now.getHours();
  const currentMin = now.getMinutes();
  const after830 = currentHour > 8 || (currentHour === 8 && currentMin >= 30);
  let displayDate = latest.date;
  if (!after830 && ALL_DATA.length >= 2) {
    const prev = ALL_DATA[ALL_DATA.length - 2];
    if (prev) displayDate = prev.date;
  }

  // 聚合
  const dailyData = aggDaily(ALL_DATA);
  const monthlyData = aggBy(ALL_DATA, r => r.date.slice(0, 7));
  const yearlyData = aggBy(ALL_DATA, r => r.date.slice(0, 4));

  let dimData;
  if (currentView === 'monthly') dimData = monthlyData;
  else if (currentView === 'yearly') dimData = yearlyData;
  else dimData = dailyData;

  const sh = latest.second_hand || {};
  const nh = latest.new_house || {};
  const sh_prev = prevDay ? prevDay.second_hand : null;
  const nh_prev = prevDay ? prevDay.new_house : null;

  let html = '';

  // ===== 头部 =====
  html += '<div class="header">' +
    '<div class="header-inner">' +
      '<div>' +
        '<div class="title">📊 上海房地产数据看板<br><span style="font-size:14px;opacity:0.8;font-weight:400;margin-left:0;display:block">Shanghai Real Estate Dashboard</span></div>' +
        '<div class="subtitle" style="margin-top:8px;display:block">数据来源：上海市房地产交易中心（网上房地产）</div>' +
      '</div>' +
      '<div style="font-size:12px;opacity:0.7;text-align:right;line-height:1.6">' +
        '<div id="update-time" style="font-weight:600;font-size:14px;opacity:1">数据日期：' + (displayDate || '—') + '（每日 08:30 更新）</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  html += '<div class="container">';

  // ===== 维度切换 =====
  html += '<div class="dim-tabs">' +
    '<button class="dim-tab' + (currentView === 'daily' ? ' active' : '') + '" onclick="switchView(\'daily\')">📅 按日</button>' +
    '<button class="dim-tab' + (currentView === 'monthly' ? ' active' : '') + '" onclick="switchView(\'monthly\')">📆 按月</button>' +
    '<button class="dim-tab' + (currentView === 'yearly' ? ' active' : '') + '" onclick="switchView(\'yearly\')">🗓️ 按年</button>' +
  '</div>';

  // ===== 二手房区块 =====
  html += '<div class="section-card">' +
    '<div class="section-card-header">' +
      '<span class="icon">🏘️</span>' +
      '<span class="name">二手房网签</span>' +
      '<span class="date">' + displayDate + '</span>' +
    '</div>' +
    '<div class="grid-row grid-4">' +
      '<div class="stat-card blue">' +
        '<div class="stat-label">📦 成交套数</div>' +
        '<div class="stat-value">' + fmtNum(sh.units) + '<span class="stat-unit">套</span></div>' +
        '<div class="stat-change">' + (currentView === 'daily' ? changeHtml(sh.units, sh_prev?.units) : '') + '</div>' +
        (currentView === 'daily' && sh_prev ? '<div class="stat-extra">前日 ' + fmtNum(sh_prev.units) + ' 套</div>' : '') +
      '</div>' +
      '<div class="stat-card green">' +
        '<div class="stat-label">📐 成交面积</div>' +
        '<div class="stat-value">' + fmtArea(sh.area) + '</div>' +
        '<div class="stat-change">' + (currentView === 'daily' ? changeHtml(sh.area, sh_prev?.area) : '') + '</div>' +
      '</div>' +
      '<div class="stat-card orange">' +
        '<div class="stat-label">📏 套均面积</div>' +
        '<div class="stat-value">' + (sh.avg_area || '—') + '<span class="stat-unit">㎡</span></div>' +
      '</div>' +
      '<div class="stat-card purple">' +
        '<div class="stat-label">📋 在售挂牌</div>' +
        '<div class="stat-value">' + fmtNum(latest.listing?.total || null) + '<span class="stat-unit">套</span></div>' +
        '<div class="stat-extra">数据仅供参考</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // ===== 一手房区块 =====
  html += '<div class="section-card">' +
    '<div class="section-card-header">' +
      '<span class="icon">🏗️</span>' +
      '<span class="name">一手房网签</span>' +
      '<span class="date">' + displayDate + '</span>' +
    '</div>' +
    '<div class="grid-row grid-4">' +
      '<div class="stat-card blue">' +
        '<div class="stat-label">📦 成交套数</div>' +
        '<div class="stat-value">' + fmtNum(nh.units) + '<span class="stat-unit">套</span></div>' +
        '<div class="stat-change">' + (currentView === 'daily' ? changeHtml(nh.units, nh_prev?.units) : '') + '</div>' +
        (currentView === 'daily' && nh_prev ? '<div class="stat-extra">前日 ' + fmtNum(nh_prev.units) + ' 套</div>' : '') +
      '</div>' +
      '<div class="stat-card green">' +
        '<div class="stat-label">📐 成交面积</div>' +
        '<div class="stat-value">' + fmtArea(nh.area) + '</div>' +
        '<div class="stat-change">' + (currentView === 'daily' ? changeHtml(nh.area, nh_prev?.area) : '') + '</div>' +
      '</div>' +
      '<div class="stat-card orange">' +
        '<div class="stat-label">📏 套均面积</div>' +
        '<div class="stat-value">' + (nh.avg_area || '—') + '<span class="stat-unit">㎡</span></div>' +
      '</div>' +
      '<div class="stat-card purple">' +
        '<div class="stat-label">🏠 可售住宅套数</div>' +
        '<div class="stat-value">' + fmtNum(latest.new_house?.available_units || null) + '<span class="stat-unit">套</span></div>' +
        '<div class="stat-extra">全市住宅可售</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // ===== 趋势图 =====
  const chartLabel = currentView === 'daily' ? '近7天走势' : currentView === 'monthly' ? '月度走势' : '年度走势';
  const displayData = currentView === 'daily' ? dimData.slice(-7) : dimData;
  
  html += '<div class="chart-row">' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏘️ 二手房 · 成交套数（' + chartLabel + '）</div>' +
      '<canvas id="ch1"></canvas>' +
    '</div>' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏗️ 一手房 · 成交套数（' + chartLabel + '）</div>' +
      '<canvas id="ch2"></canvas>' +
    '</div>' +
  '</div>';
  
  html += '<div class="chart-row">' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏘️ 二手房 · 成交面积（' + chartLabel + '）</div>' +
      '<canvas id="ch3"></canvas>' +
    '</div>' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏗️ 一手房 · 成交面积（' + chartLabel + '）</div>' +
      '<canvas id="ch4"></canvas>' +
    '</div>' +
  '</div>';
  
  html += '<div class="chart-row">' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏘️ 二手房 · 挂牌趋势（' + chartLabel + '）</div>' +
      '<canvas id="ch5"></canvas>' +
    '</div>' +
    '<div class="chart-card">' +
      '<div class="chart-card-title">🏗️ 一手房 · 可售趋势（' + chartLabel + '）</div>' +
      '<canvas id="ch6"></canvas>' +
    '</div>' +
  '</div>';

  // ===== 新楼盘公示 =====
  if (latest.presale && latest.presale.length > 0) {
    html += '<div class="table-wrap">' +
      '<div class="table-title">🏗️ 最新公示 ' + latest.presale.length + ' 条（' + latest.date + '）</div>' +
      '<table class="presale-table">' +
        '<tr><th>#</th><th>项目名称</th><th>区域</th><th>预售许可证号</th><th>公示日期</th></tr>';
    latest.presale.forEach((p, i) => {
      html += '<tr>' +
        '<td style="color:#94a3b8;font-size:12px">' + (i + 1) + '</td>' +
        '<td style="font-weight:600;color:#1e3a8a">' + (p.project_name || '—') + '</td>' +
        '<td>' + (p.district || p.address?.replace(/^.*?(.{2}区).*$/, '$1') || '—') + '</td>' +
        '<td style="font-family:monospace;font-size:12px;color:#475569">' + (p.license || '—') + '</td>' +
        '<td style="font-size:12px;color:#64748b">' + (p.date || latest.date) + '</td>' +
      '</tr>';
    });
    html += '</table></div>';
  }

  // ===== 历史数据表格 =====
  html += '<div class="table-wrap">';
  html += '<table>' +
    '<tr>' +
      '<th>' + (currentView === 'yearly' ? '年份' : currentView === 'monthly' ? '月份' : '日期') + '</th>' +
      '<th>二手房套数</th><th>二手房面积</th><th>套均面积</th>' +
      '<th>一手房套数</th><th>一手房面积</th><th>套均面积</th>' +
      '<th>新楼盘公示</th>' +
    '</tr>';
  
  const tableData = currentView === 'daily' ? ALL_DATA.slice(-30) : dimData;
  [...tableData].reverse().forEach((r, i) => {
    const isLatest = i === 0;
    const k = r.key || r.month || r.date || '';
    const sh_u = r.sh_u ?? r.second_hand?.units ?? 0;
    const sh_a = r.sh_a ?? r.second_hand?.area ?? 0;
    const sh_avg = r.sh_avg ?? r.second_hand?.avg_area ?? null;
    const nh_u = r.nh_u ?? r.new_house?.units ?? 0;
    const nh_a = r.nh_a ?? r.new_house?.area ?? 0;
    const nh_avg = r.nh_avg ?? r.new_house?.avg_area ?? null;
    const ps = r.presale_count ?? (r.presale || []).length ?? 0;
    
    html += '<tr class="' + (isLatest ? 'latest' : '') + '">' +
      '<td>' + k + (isLatest ? ' 🔵' : '') + '</td>' +
      '<td>' + fmtNum(sh_u) + '</td><td>' + fmtArea(sh_a) + '</td><td>' + (sh_avg ? sh_avg + '㎡' : '—') + '</td>' +
      '<td>' + fmtNum(nh_u) + '</td><td>' + fmtArea(nh_a) + '</td><td>' + (nh_avg ? nh_avg + '㎡' : '—') + '</td>' +
      '<td style="color:#d97706;font-weight:600">' + (ps > 0 ? ps + ' 条' : '—') + '</td>' +
    '</tr>';
  });
  html += '</table></div>';

  // 页脚
  html += '<div class="footer">数据来源：<a href="https://www.fangdi.com.cn" target="_blank">上海市房地产交易中心（网上房地产）</a> · 每日自动采集，仅供参考<br>⚠️ 数据以官方网站为准</div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;

  // ===== 渲染图表 =====
  renderCharts(displayData, currentView);
}

function renderCharts(data, view) {
  const labels = data.map(d => d.key);
  const shU = data.map(d => d.sh_u || 0);
  const nhU = data.map(d => d.nh_u || 0);
  const shA = data.map(d => d.sh_a || 0);
  const nhA = data.map(d => d.nh_a || 0);

  function makeOpts(yLabel) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleFont: { size: 13, weight: '600' },
          bodyFont: { size: 13 },
          padding: 12,
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            label: function(ctx) { return ctx.parsed.y.toLocaleString('zh-CN') + (yLabel === '套' ? ' 套' : ' ㎡') }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94a3b8', maxRotation: 45, minRotation: 0 } },
        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 }, color: '#94a3b8', callback: v => v >= 10000 ? (v / 10000).toFixed(1) + '万' : v } }
      },
      elements: { point: { radius: 0, hoverRadius: 5 }, line: { borderWidth: 2.5 } }
    };
  }

  function makeGradient(ctx, color) {
    const g = ctx.createLinearGradient(0, 0, 0, 260);
    const c1 = color.replace(/,\s*1\)$/, ',0.25)');
    const c2 = color.replace(/,\s*1\)$/, ',0.02)');
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    return g;
  }

  const charts = [
    { id: 'ch1', data: shU, color: 'rgba(59,130,246,1)', label: '成交套数' },
    { id: 'ch2', data: nhU, color: 'rgba(16,185,129,1)', label: '成交套数' },
    { id: 'ch3', data: shA, color: 'rgba(59,130,246,1)', label: '成交面积' },
    { id: 'ch4', data: nhA, color: 'rgba(16,185,129,1)', label: '成交面积' }
  ];

  charts.forEach(c => {
    const canvas = document.getElementById(c.id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: c.label,
          data: c.data,
          borderColor: c.color,
          backgroundColor: makeGradient(ctx, c.color),
          fill: true,
          tension: 0.35,
          point: {
            radius: function(ctx) { const idx = ctx.dataIndex; return idx === c.data.length - 1 ? 5 : 0; },
            backgroundColor: c.color,
            hoverRadius: 6
          }
        }]
      },
      options: makeOpts(c.id === 'ch1' || c.id === 'ch2' ? '套' : '㎡')
    });
  });
}

function switchView(v) {
  currentView = v;
  render();
}

// ========== 加载数据 ==========
// 从 data.json 加载数据
fetch('../dashboard_dist/data.json')
  .then(response => {
    if (!response.ok) {
      throw new Error('数据加载失败：' + response.status);
    }
    return response.json();
  })
  .then(data => {
    ALL_DATA = data;
    render();
  })
  .catch(error => {
    document.getElementById('app').innerHTML = '<div class="loading">数据加载失败，请稍后重试</div>';
    console.error('数据加载失败：', error);
  });
</script>
</body>
</html>
