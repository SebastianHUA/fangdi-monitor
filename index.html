<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海房地产成交数据监测看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); color: white; padding: 24px 30px 18px; }
        .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
        .header h1 .title-main { display: block; }
        .header h1 .title-sub { display: block; font-size: 18px; font-weight: 400; opacity: 0.85; }
        .header .update-info { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .container { max-width: 1440px; margin: 0 auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 16px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .label { font-size: 12px; color: #666; margin-bottom: 6px; }
        .stat-card .value { font-size: 26px; font-weight: 700; color: #1a73e8; line-height: 1.2; }
        .stat-card .unit { font-size: 12px; color: #999; margin-top: 2px; }
        .stat-card .change { font-size: 11px; margin-top: 6px; }
        .change.up { color: #e53935; }
        .change.down { color: #43a047; }
        .chart-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 18px; }
        .chart-container h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #333; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
        .controls { display: flex; gap: 8px; margin-bottom: 14px; }
        .controls button { padding: 6px 14px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s; }
        .controls button.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .controls button:hover:not(.active) { background: #f5f5f5; }
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .data-table { min-width: 900px; width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .data-table th, .data-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #eee; white-space: nowrap; }
        .data-table th:first-child, .data-table td:first-child { text-align: left; }
        .data-table th { background: #f8f9fa; font-weight: 600; color: #555; position: sticky; top: 0; }
        .data-table tr:hover { background: #f5f8ff; }
        .loading { text-align: center; padding: 60px; color: #999; }
        .error { text-align: center; padding: 60px; color: #e53935; }
        .last-update { text-align: right; font-size: 12px; color: #999; margin-top: 14px; }
        .section-title { font-size: 16px; font-weight: 600; color: #333; margin: 24px 0 12px; padding-left: 10px; border-left: 3px solid #1a73e8; }
        /* 认购公示表格 */
        .subscription-table { min-width: 1100px; width: 100%; border-collapse: collapse; font-size: 13px; }
        .subscription-table th, .subscription-table td { padding: 9px 10px; text-align: left; border-bottom: 1px solid #eee; }
        .subscription-table th { background: #e8f0fe; font-weight: 600; color: #333; position: sticky; top: 0; }
        .subscription-table tr:hover { background: #f5f8ff; }
        .badge-new { background: #e53935; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        .badge-ongoing { background: #43a047; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        .badge-ended { background: #999; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span class="title-main">🏠 上海房地产成交数据</span>
            <span class="title-sub">监测看板</span>
        </h1>
        <p class="update-info" id="updateInfo">数据日期：加载中...（每日8:00更新）</p>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">🏗️ 一手房网签</div>
                <div class="value" id="newHouseCount">--</div>
                <div class="unit">套</div>
                <div class="change" id="newHouseChange"></div>
            </div>
            <div class="stat-card">
                <div class="label">🏗️ 一手房面积</div>
                <div class="value" id="newHouseArea">--</div>
                <div class="unit">万㎡</div>
            </div>
            <div class="stat-card">
                <div class="label">🏘️ 二手房网签</div>
                <div class="value" id="secondHandCount">--</div>
                <div class="unit">套</div>
                <div class="change" id="secondHandChange"></div>
            </div>
            <div class="stat-card">
                <div class="label">🏘️ 二手房面积</div>
                <div class="value" id="secondHandArea">--</div>
                <div class="unit">万㎡</div>
            </div>
            <div class="stat-card">
                <div class="label">🏢 一手房可售</div>
                <div class="value" id="availableUnits">--</div>
                <div class="unit">套</div>
            </div>
            <div class="stat-card">
                <div class="label">📋 二手房挂牌</div>
                <div class="value" id="listingCount">--</div>
                <div class="unit">笔</div>
            </div>
        </div>

        <!-- 视图切换 -->
        <div class="controls">
            <button class="active" onclick="setView('daily')">日度</button>
            <button onclick="setView('monthly')">月度</button>
            <button onclick="setView('yearly')">年度</button>
        </div>

        <!-- 趋势图 -->
        <div class="chart-row">
            <div class="chart-container">
                <h2>📈 一手房成交趋势</h2>
                <canvas id="newHouseChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>📈 二手房成交趋势</h2>
                <canvas id="secondHandChart"></canvas>
            </div>
        </div>

        <!-- 对比图 -->
        <div class="chart-container">
            <h2>📊 近期成交对比（最近7期）</h2>
            <canvas id="compareChart"></canvas>
        </div>

        <!-- 近期认购楼盘公示 -->
        <div class="section-title">📋 近期认购楼盘公示</div>
        <div class="chart-container">
            <div class="table-wrapper">
                <table class="subscription-table" id="subscriptionTable">
                    <thead>
                        <tr>
                            <th>认购开始日期</th>
                            <th>项目名称</th>
                            <th>所在区</th>
                            <th>开发企业</th>
                            <th>预售许可证号</th>
                            <th>套数</th>
                            <th>面积(㎡)</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="subscriptionBody">
                        <tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="subscriptionUpdate"></div>
        </div>

        <!-- 历史数据表格 -->
        <div class="section-title">📊 历史成交数据</div>
        <div class="chart-container">
            <div class="table-wrapper">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>一手房网签(套)</th>
                            <th>一手房面积(万㎡)</th>
                            <th>可售(套)</th>
                            <th>二手房网签(套)</th>
                            <th>二手房面积(万㎡)</th>
                            <th>挂牌(笔)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" style="text-align:center;color:#999;padding:20px;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        let allData = [];
        let subscriptionData = [];
        let currentView = 'daily';
        let charts = {};

        // 加载成交数据
        async function loadData() {
            try {
                const response = await fetch('./data/fangdi_data.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据加载失败');
                allData = await response.json();
                allData.sort((a, b) => a.date > b.date ? 1 : -1);

                // 更新页面顶部数据日期（T-1日）
                if (allData.length > 0) {
                    const latestDate = allData[allData.length - 1].date;
                    document.getElementById('updateInfo').textContent =
                        '数据日期：' + latestDate + '（每日8:00更新）';
                }

                updateDashboard();
            } catch (e) {
                console.error(e);
                document.querySelector('.container').innerHTML =
                    '<div class="error">数据加载失败，请确保 data/fangdi_data.json 存在</div>';
            }
        }

        // 加载认购公示数据
        async function loadSubscriptionData() {
            try {
                const response = await fetch('./data/subscription_data.json?t=' + Date.now());
                if (!response.ok) {
                    document.getElementById('subscriptionBody').innerHTML =
                        '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">暂无认购公示数据</td></tr>';
                    return;
                }
                subscriptionData = await response.json();
                updateSubscriptionTable();
            } catch (e) {
                console.error('认购数据加载失败:', e);
                document.getElementById('subscriptionBody').innerHTML =
                    '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">认购公示数据加载失败</td></tr>';
            }
        }

        // 更新认购公示表格（显示前后7天）
        function updateSubscriptionTable() {
            const tbody = document.getElementById('subscriptionBody');
            tbody.innerHTML = '';

            if (subscriptionData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">暂无数据</td></tr>';
                return;
            }

            // 计算前后7天的范围
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startRange = new Date(today);
            startRange.setDate(startRange.getDate() - 7);
            const endRange = new Date(today);
            endRange.setDate(endRange.getDate() + 7);

            // 过滤前后7天的数据
            const filtered = subscriptionData.filter(item => {
                const itemDate = new Date(item.subscriptionStartDate);
                itemDate.setHours(0, 0, 0, 0);
                return itemDate >= startRange && itemDate <= endRange;
            });

            // 按认购开始日期排序（最近的在前）
            filtered.sort((a, b) => {
                const da = new Date(a.subscriptionStartDate || a.认购开始日期 || 0);
                const db = new Date(b.subscriptionStartDate || b.认购开始日期 || 0);
                return db - da;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">前后7天内无认购楼盘公示</td></tr>';
                return;
            }

            filtered.forEach(d => {
                const tr = document.createElement('tr');
                const startDate = d.subscriptionStartDate || d.认购开始日期 || '-';
                const name = d.projectName || d.项目名称 || '-';
                const district = d.district || d.所在区 || '-';
                const company = d.developer || d.开发企业 || '-';
                const license = d.presaleLicense || d.预售许可证号 || '-';
                const units = d.units || d.套数 || '-';
                const area = d.area || d.面积 || '-';
                const status = getSubscriptionStatus(startDate);

                tr.innerHTML = `
                    <td>${startDate}</td>
                    <td>${name}</td>
                    <td>${district}</td>
                    <td>${company}</td>
                    <td>${license}</td>
                    <td style="text-align:right;">${units}</td>
                    <td style="text-align:right;">${area}</td>
                    <td>${status}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('subscriptionUpdate').textContent =
                '显示前后7天内的认购楼盘，共 ' + filtered.length + ' 条';
        }

        // 计算认购状态
        function getSubscriptionStatus(startDateStr) {
            if (!startDateStr || startDateStr === '-') return '<span class="badge-ended">未知</span>';

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startDate = new Date(startDateStr);
            startDate.setHours(0, 0, 0, 0);

            const endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + 3); // 认购期通常3天

            if (today < startDate) {
                return '<span class="badge-new">即将开始</span>';
            } else if (today >= startDate && today <= endDate) {
                return '<span class="badge-ongoing">进行中</span>';
            } else {
                return '<span class="badge-ended">已结束</span>';
            }
        }

        // 更新看板
        function updateDashboard() {
            if (allData.length === 0) return;

            const latest = allData[allData.length - 1];
            const prev = allData.length > 1 ? allData[allData.length - 2] : null;

            // 安全地获取数据
            const nh = latest.newHouse || {};
            const sh = latest.secondHand || {};

            // 更新统计卡片
            document.getElementById('newHouseCount').textContent = nh.todaySignUnits ?? '--';
            document.getElementById('newHouseArea').textContent =
                nh.todaySignArea ? (nh.todaySignArea / 10000).toFixed(2) : '--';
            document.getElementById('secondHandCount').textContent = sh.yesterdaySaleCount ?? '--';
            document.getElementById('secondHandArea').textContent =
                sh.yesterdaySaleArea ? (sh.yesterdaySaleArea / 10000).toFixed(2) : '--';
            document.getElementById('availableUnits').textContent = nh.availableUnits ?? '--';
            document.getElementById('listingCount').textContent = sh.listingCount ?? '--';

            // 更新环比
            if (prev) {
                const prevNh = prev.newHouse || {};
                const prevSh = prev.secondHand || {};
                if (prevNh.todaySignUnits && nh.todaySignUnits) {
                    const newHouseChange = ((nh.todaySignUnits - prevNh.todaySignUnits) / prevNh.todaySignUnits * 100).toFixed(1);
                    document.getElementById('newHouseChange').innerHTML =
                        '环比 ' + (newHouseChange > 0 ? '↑' : '↓') + ' ' + Math.abs(newHouseChange) + '%';
                    document.getElementById('newHouseChange').className = 'change ' + (newHouseChange > 0 ? 'up' : 'down');
                }
                if (prevSh.yesterdaySaleCount && sh.yesterdaySaleCount) {
                    const secondHandChange = ((sh.yesterdaySaleCount - prevSh.yesterdaySaleCount) / prevSh.yesterdaySaleCount * 100).toFixed(1);
                    document.getElementById('secondHandChange').innerHTML =
                        '环比 ' + (secondHandChange > 0 ? '↑' : '↓') + ' ' + Math.abs(secondHandChange) + '%';
                    document.getElementById('secondHandChange').className = 'change ' + (secondHandChange > 0 ? 'up' : 'down');
                }
            }

            updateCharts();
            updateTable();
        }

        // 更新图表（去掉边框，优化颜色）
        function updateCharts() {
            const data = getViewData();
            const labels = data.map(d => d.label);

            // 图表颜色配置（无边框，更现代）
            const colors = {
                primary: { bg: 'rgba(26,115,232,0.15)', border: '#1a73e8' },
                secondary: { bg: 'rgba(15,71,161,0.15)', border: '#0f47a1' },
                pink: { bg: 'rgba(214,52,127,0.15)', border: '#d6347f' },
                orange: { bg: 'rgba(255,152,0,0.15)', border: '#ff9800' }
            };

            // 一手房趋势图
            if (charts.newHouse) charts.newHouse.destroy();
            const newHouseCtx = document.getElementById('newHouseChart').getContext('2d');
            charts.newHouse = new Chart(newHouseCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '成交套数',
                        data: data.map(d => d.newHouseCount),
                        borderColor: colors.primary.border,
                        backgroundColor: colors.primary.bg,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        yAxisID: 'y'
                    }, {
                        label: '成交面积(万㎡)',
                        data: data.map(d => d.newHouseArea),
                        borderColor: colors.secondary.border,
                        backgroundColor: colors.secondary.bg,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        yAxisID: 'y1'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle' } } },
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', position: 'left', title: { display: true, text: '套数' }, grid: { color: '#f0f0f0' } },
                        y1: { type: 'linear', position: 'right', title: { display: true, text: '万㎡' }, grid: { drawOnChartArea: false } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 二手房趋势图
            if (charts.secondHand) charts.secondHand.destroy();
            const secondHandCtx = document.getElementById('secondHandChart').getContext('2d');
            charts.secondHand = new Chart(secondHandCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '成交套数',
                        data: data.map(d => d.secondHandCount),
                        borderColor: colors.pink.border,
                        backgroundColor: colors.pink.bg,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        yAxisID: 'y'
                    }, {
                        label: '成交面积(万㎡)',
                        data: data.map(d => d.secondHandArea),
                        borderColor: colors.orange.border,
                        backgroundColor: colors.orange.bg,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        yAxisID: 'y1'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle' } } },
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', position: 'left', title: { display: true, text: '套数' }, grid: { color: '#f0f0f0' } },
                        y1: { type: 'linear', position: 'right', title: { display: true, text: '万㎡' }, grid: { drawOnChartArea: false } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 对比图
            if (charts.compare) charts.compare.destroy();
            const compareCtx = document.getElementById('compareChart').getContext('2d');
            const recentData = data.slice(-7);
            charts.compare = new Chart(compareCtx, {
                type: 'bar',
                data: {
                    labels: recentData.map(d => d.label),
                    datasets: [{
                        label: '一手房(套)',
                        data: recentData.map(d => d.newHouseCount),
                        backgroundColor: colors.primary.border,
                        borderRadius: 4,
                        maxBarThickness: 40
                    }, {
                        label: '二手房(套)',
                        data: recentData.map(d => d.secondHandCount),
                        backgroundColor: colors.pink.border,
                        borderRadius: 4,
                        maxBarThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle' } } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 获取视图数据
        function getViewData() {
            if (currentView === 'daily') {
                return allData.map(d => ({
                    label: d.date.slice(5),
                    newHouseCount: (d.newHouse || {}).todaySignUnits || 0,
                    newHouseArea: ((d.newHouse || {}).todaySignArea || 0) / 10000,
                    secondHandCount: (d.secondHand || {}).yesterdaySaleCount || 0,
                    secondHandArea: ((d.secondHand || {}).yesterdaySaleArea || 0) / 10000
                }));
            } else if (currentView === 'monthly') {
                const monthly = {};
                allData.forEach(d => {
                    const month = d.date.slice(0, 7);
                    if (!monthly[month]) monthly[month] = { count: 0, area: 0, sc: 0, sa: 0, days: 0 };
                    monthly[month].count += (d.newHouse || {}).todaySignUnits || 0;
                    monthly[month].area += ((d.newHouse || {}).todaySignArea || 0) / 10000;
                    monthly[month].sc += (d.secondHand || {}).yesterdaySaleCount || 0;
                    monthly[month].sa += ((d.secondHand || {}).yesterdaySaleArea || 0) / 10000;
                    monthly[month].days++;
                });
                return Object.entries(monthly).map(([month, d]) => ({
                    label: month,
                    newHouseCount: Math.round(d.count / d.days),
                    newHouseArea: Math.round(d.area / d.days * 100) / 100,
                    secondHandCount: Math.round(d.sc / d.days),
                    secondHandArea: Math.round(d.sa / d.days * 100) / 100
                }));
            } else {
                const yearly = {};
                allData.forEach(d => {
                    const year = d.date.slice(0, 4);
                    if (!yearly[year]) yearly[year] = { count: 0, area: 0, sc: 0, sa: 0, days: 0 };
                    yearly[year].count += (d.newHouse || {}).todaySignUnits || 0;
                    yearly[year].area += ((d.newHouse || {}).todaySignArea || 0) / 10000;
                    yearly[year].sc += (d.secondHand || {}).yesterdaySaleCount || 0;
                    yearly[year].sa += ((d.secondHand || {}).yesterdaySaleArea || 0) / 10000;
                    yearly[year].days++;
                });
                return Object.entries(yearly).map(([year, d]) => ({
                    label: year,
                    newHouseCount: Math.round(d.count / d.days),
                    newHouseArea: Math.round(d.area / d.days * 100) / 100,
                    secondHandCount: Math.round(d.sc / d.days),
                    secondHandArea: Math.round(d.sa / d.days * 100) / 100
                }));
            }
        }

        // 更新历史数据表格
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const recent = allData.slice(-30).reverse();
            recent.forEach(d => {
                const nh = d.newHouse || {};
                const sh = d.secondHand || {};
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.date}</td>
                    <td style="text-align:right;">${nh.todaySignUnits ?? '-'}</td>
                    <td style="text-align:right;">${nh.todaySignArea ? (nh.todaySignArea / 10000).toFixed(2) : '-'}</td>
                    <td style="text-align:right;">${nh.availableUnits ?? '-'}</td>
                    <td style="text-align:right;">${sh.yesterdaySaleCount ?? '-'}</td>
                    <td style="text-align:right;">${sh.yesterdaySaleArea ? (sh.yesterdaySaleArea / 10000).toFixed(2) : '-'}</td>
                    <td style="text-align:right;">${sh.listingCount ?? '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            if (allData.length > 0) {
                document.getElementById('lastUpdate').textContent =
                    '最后更新：' + allData[allData.length - 1].date;
            }
        }

        // 设置视图
        function setView(view) {
            currentView = view;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateCharts();
        }

        // 初始化
        loadData();
        loadSubscriptionData();
        setInterval(() => { loadData(); loadSubscriptionData(); }, 300000);
    </script>
</body>
</html>
