<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- v2: force refresh 1783311856900 -->
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海房地产成交数据监测看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        
        /* 标题 */
        .header { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); color: white; padding: 20px 30px 16px; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
        .header .update-info { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        
        .container { max-width: 1440px; margin: 0 auto; padding: 20px; }
        
        /* 统计卡片 - 单位不换行，颜色区分 */
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 16px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .label { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 500; }
        .stat-card .value { font-size: 28px; font-weight: 700; line-height: 1.2; display: inline; }
        .stat-card .unit { font-size: 13px; margin-left: 3px; display: inline; font-weight: 400; }
        .stat-card .change { font-size: 11px; margin-top: 8px; }
        
        /* 一手房卡片 - 蓝色系 */
        .stat-card.newhouse .value { color: #1a73e8; }
        .stat-card.newhouse .unit { color: #5a9cf8; }
        /* 二手房卡片 - 绿色系 */
        .stat-card.secondhand .value { color: #2e7d32; }
        .stat-card.secondhand .unit { color: #66bb6a; }
        
        .change.up { color: #e53935; }
        .change.down { color: #43a047; }
        
        /* 图表 */
        .chart-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 18px; }
        .chart-container h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #333; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
        
        /* 控制按钮 */
        .controls { display: flex; gap: 8px; margin-bottom: 14px; }
        .controls button { padding: 6px 14px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s; }
        .controls button.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .controls button:hover:not(.active) { background: #f5f5f5; }
        
        /* 表格 - 横向滚动 */
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .data-table { min-width: 900px; width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .data-table th, .data-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #eee; white-space: nowrap; }
        .data-table th:first-child, .data-table td:first-child { text-align: left; }
        .data-table th { background: #f8f9fa; font-weight: 600; color: #555; position: sticky; top: 0; }
        .data-table tr:hover { background: #f5f8ff; }
        
        .loading { text-align: center; padding: 60px; color: #999; }
        .error { text-align: center; padding: 60px; color: #e53935; }
        .last-update { text-align: right; font-size: 12px; color: #999; margin-top: 14px; }
        .section-title { font-size: 16px; font-weight: 600; color: #333; margin: 24px 0 12px; padding-left: 10px; border-left: 3px solid #1a73e8; }
        
        /* 认购公示表格 */
        .subscription-table { min-width: 1100px; width: 100%; border-collapse: collapse; font-size: 13px; }
        .subscription-table th, .subscription-table td { padding: 9px 10px; text-align: left; border-bottom: 1px solid #eee; }
        .subscription-table th { background: #e8f0fe; font-weight: 600; color: #333; position: sticky; top: 0; }
        .subscription-table tr:hover { background: #f5f8ff; }
        .badge-new { background: #e53935; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        .badge-ongoing { background: #43a047; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        .badge-ended { background: #999; color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
        
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 上海房地产成交数据监测看板</h1>
        <p class="update-info" id="updateInfo">数据日期：加载中...（每日8:00更新）</p>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card newhouse">
                <div class="label">🏗️ 一手房网签</div>
                <span class="value" id="newHouseCount">--</span><span class="unit">套</span>
                <div class="change" id="newHouseChange"></div>
            </div>
            <div class="stat-card secondhand">
                <div class="label">🏘️ 二手房网签</div>
                <span class="value" id="secondHandCount">--</span><span class="unit">套</span>
                <div class="change" id="secondHandChange"></div>
            </div>
            <div class="stat-card newhouse">
                <div class="label">🏗️ 一手房面积</div>
                <span class="value" id="newHouseArea">--</span><span class="unit">㎡</span>
            </div>
            <div class="stat-card secondhand">
                <div class="label">🏘️ 二手房面积</div>
                <span class="value" id="secondHandArea">--</span><span class="unit">㎡</span>
            </div>
            <div class="stat-card newhouse">
                <div class="label">🏢 一手房可售</div>
                <span class="value" id="availableUnits">--</span><span class="unit">套</span>
            </div>
            <div class="stat-card secondhand">
                <div class="label">📋 二手房挂牌</div>
                <span class="value" id="listingCount">--</span><span class="unit">套</span>
            </div>
        </div>

        <!-- 趋势图 -->
        <div class="chart-container">
            <div class="controls">
                <button class="active" onclick="setView('daily')">日报</button>
                <button onclick="setView('monthly')">月报</button>
                <button onclick="setView('yearly')">年报</button>
            </div>
            <div class="chart-row">
                <div>
                    <h2>一手房网签趋势</h2>
                    <canvas id="newHouseChart"></canvas>
                </div>
                <div>
                    <h2>二手房网签趋势</h2>
                    <canvas id="secondHandChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 认购公示 -->
        <!-- 近期认购楼盘公示 -->
        <div class="section-title">📢 近期认购楼盘公示 <span style="font-size:12px;color:#999;font-weight:normal;margin-left:8px;">右滑查看更多信息</span></div>
        <div class="chart-container">
            <div class="table-wrapper">
                <table class="subscription-table" id="subscriptionTable">
                    <thead>
                        <tr>
                            <th>所在区</th>
                            <th>项目名称</th>
                            <th>开发企业</th>
                            <th>认购开始</th>
                            <th>认购结束</th>
                            <th>套数</th>
                            <th>面积(㎡)</th>
                            <th>备案均价</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="subscriptionBody">
                        <tr><td colspan="9" style="text-align:center;color:#999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 历史数据 -->
        <div class="section-title">📊 历史数据明细表 <span style="font-size:12px;color:#999;font-weight:normal;margin-left:8px;">右滑查看更多信息</span></div>
        <div class="chart-container">
            <div class="table-wrapper">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>一手房网签(套)</th>
                            <th>一手房面积(㎡)</th>
                            <th>一手房可售(套)</th>
                            <th>二手房网签(套)</th>
                            <th>二手房面积(㎡)</th>
                            <th>二手房挂牌(套)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" style="text-align:center;color:#999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentView = 'daily';
        let charts = {};

        // 获取数据日期（直接从最新数据中获取）
        function getDataDate() {
            if (allData && allData.length > 0) {
                // 查找最新完整的数据（跳过不完整数据）
                for (let i = 0; i < allData.length; i++) {
                    const d = allData[i];
                    const hasNewHouse = (d.newHouse?.todaySignUnits ?? 0) > 0;
                    const hasSecondHand = (d.secondHand?.yesterdaySaleCount ?? 0) > 0;
                    if (hasNewHouse || hasSecondHand) {
                        return d.date;
                    }
                }
            }
            return '未知';
        }

        // 加载数据
        async function loadData() {
            try {
                console.log('[看板] 开始加载数据...');
                // 修正数据路径：从项目根目录加载（适配本地服务器和CloudStudio部署）
                const dataUrl = window.location.pathname.includes('/dashboard/') 
                    ? '../data/fangdi_data.json?t=' + Date.now()
                    : './data/fangdi_data.json?t=' + Date.now();
                const response = await fetch(dataUrl);
                if (!response.ok) throw new Error('数据加载失败: ' + response.status);
                allData = await response.json();
                console.log('[看板] 数据加载成功:', allData);
                
                // 兼容处理：如果数据是单个对象（而非数组），自动转为数组
                if (allData && !Array.isArray(allData)) {
                    allData = [allData];
                    console.log('[看板] 单条数据已自动转为数组');
                }
                
                if (!allData || allData.length === 0) {
                    document.getElementById('updateInfo').textContent = '暂无数据';
                    return;
                }
                
                // 按日期降序排序
                allData.sort((a, b) => b.date > a.date ? 1 : -1);
                
                // 逐个更新，如果某个失败也不影响其他
                try { updateDashboard(); } catch(e) { console.error('updateDashboard失败:', e); }
                try { updateCharts(); } catch(e) { console.error('updateCharts失败:', e); }
                try { updateTable(); } catch(e) { console.error('updateTable失败:', e); }
                try { await updateSubscription(); } catch(e) { console.error('updateSubscription失败:', e); }
                
                console.log('[看板] 所有数据更新完成');
                
            } catch (e) {
                console.error('[看板] 加载失败:', e);
                document.getElementById('updateInfo').textContent = '数据加载失败：' + e.message;
                // 显示详细错误信息在页面上
                document.getElementById('newHouseCount').textContent = '?';
                document.getElementById('secondHandCount').textContent = '?';
            }
        }

        // 更新看板
        function updateDashboard() {
            // 查找最新完整的数据（跳过不完整数据）
            let latestIndex = 0;
            for (let i = 0; i < allData.length; i++) {
                const d = allData[i];
                const hasNewHouse = (d.newHouse?.todaySignUnits ?? 0) > 0;
                const hasSecondHand = (d.secondHand?.yesterdaySaleCount ?? 0) > 0;
                if (hasNewHouse || hasSecondHand) {
                    latestIndex = i;
                    break;
                }
            }
            
            const latest = allData[latestIndex];
            const prev = allData[latestIndex + 1];
            
            // 更新数据日期（T-1日）
            const dataDate = getDataDate();
            document.getElementById('updateInfo').textContent = '数据日期：' + dataDate + '（每日8:00更新）';
            
            // 一手房网签
            const nhUnits = latest.newHouse?.todaySignUnits ?? latest.newHouse?.todaySaleCount ?? 0;
            document.getElementById('newHouseCount').textContent = nhUnits.toLocaleString();
            
            // 一手房面积（取整数）
            const nhArea = latest.newHouse?.todaySignArea ?? latest.newHouse?.todaySaleArea ?? 0;
            document.getElementById('newHouseArea').textContent = Math.round(nhArea).toLocaleString();
            
            // 二手房网签
            const shUnits = latest.secondHand?.yesterdaySaleCount ?? 0;
            document.getElementById('secondHandCount').textContent = shUnits.toLocaleString();
            
            // 二手房面积（取整数，直接显示㎡）
            const shArea = latest.secondHand?.yesterdaySaleArea ?? 0;
            document.getElementById('secondHandArea').textContent = Math.round(shArea).toLocaleString();
            
            // 一手房可售
            const avail = latest.newHouse?.availableUnits ?? 0;
            document.getElementById('availableUnits').textContent = avail.toLocaleString();
            
            // 二手房挂牌
            const listing = latest.secondHand?.listingCount ?? 0;
            document.getElementById('listingCount').textContent = listing.toLocaleString();
            
            // 环比
            if (prev) {
                const nhChange = prev.newHouse?.todaySignUnits ? 
                    ((nhUnits - prev.newHouse.todaySignUnits) / prev.newHouse.todaySignUnits * 100).toFixed(1) : 0;
                const shChange = prev.secondHand?.yesterdaySaleCount ? 
                    ((shUnits - prev.secondHand.yesterdaySaleCount) / prev.secondHand.yesterdaySaleCount * 100).toFixed(1) : 0;
                
                document.getElementById('newHouseChange').innerHTML = 
                    (nhChange >= 0 ? '▲' : '▼') + ' ' + Math.abs(nhChange) + '%';
                document.getElementById('newHouseChange').className = 'change ' + (nhChange >= 0 ? 'up' : 'down');
                
                document.getElementById('secondHandChange').innerHTML = 
                    (shChange >= 0 ? '▲' : '▼') + ' ' + Math.abs(shChange) + '%';
                document.getElementById('secondHandChange').className = 'change ' + (shChange >= 0 ? 'up' : 'down');
            }
            
            document.getElementById('lastUpdate').textContent = '最后更新：' + new Date().toLocaleString('zh-CN');
        }

        // 更新趋势图 - 细线，无边框
        function updateCharts() {
            const viewData = getViewData();
            
            // 一手房趋势图
            if (charts.newHouse) charts.newHouse.destroy();
            const nhCtx = document.getElementById('newHouseChart').getContext('2d');
            charts.newHouse = new Chart(nhCtx, {
                type: 'line',
                data: {
                    labels: viewData.map(d => d.label),
                    datasets: [{
                        label: currentView === 'daily' ? '日网签套数' : currentView === 'monthly' ? '月网签套数' : '年网签套数',
                        data: viewData.map(d => d.newHouseCount),
                        borderColor: '#1a73e8',
                        backgroundColor: 'rgba(26,115,232,0.08)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { 
                                boxWidth: 20,  // 减小示例图标宽度
                                boxHeight: 2   // 细线
                            } 
                        }
                    },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });
            
            // 二手房趋势图
            if (charts.secondHand) charts.secondHand.destroy();
            const shCtx = document.getElementById('secondHandChart').getContext('2d');
            charts.secondHand = new Chart(shCtx, {
                type: 'line',
                data: {
                    labels: viewData.map(d => d.label),
                    datasets: [{
                        label: currentView === 'daily' ? '日网签套数' : currentView === 'monthly' ? '月网签套数' : '年网签套数',
                        data: viewData.map(d => d.secondHandCount),
                        borderColor: '#2e7d32',
                        backgroundColor: 'rgba(46,125,50,0.08)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { 
                                boxWidth: 20,  // 减小示例图标宽度
                                boxHeight: 2   // 细线
                            } 
                        }
                    },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 获取视图数据
        function getViewData() {
            if (currentView === 'daily') {
                return allData.slice(0, 30).reverse().map(d => ({
                    label: d.date.slice(5),
                    newHouseCount: d.newHouse?.todaySignUnits ?? d.newHouse?.todaySaleCount ?? 0,
                    newHouseArea: d.newHouse?.todaySignArea ?? d.newHouse?.todaySaleArea ?? 0,
                    secondHandCount: d.secondHand?.yesterdaySaleCount ?? 0,
                    secondHandArea: (d.secondHand?.yesterdaySaleArea ?? 0) / 10000
                }));
            } else if (currentView === 'monthly') {
                const monthly = {};
                allData.forEach(d => {
                    const month = d.date.slice(0, 7);
                    if (!monthly[month]) monthly[month] = { count: 0, area: 0, secondCount: 0, secondArea: 0, days: 0 };
                    monthly[month].count += d.newHouse?.todaySignUnits ?? d.newHouse?.todaySaleCount ?? 0;
                    monthly[month].area += d.newHouse?.todaySignArea ?? d.newHouse?.todaySaleArea ?? 0;
                    monthly[month].secondCount += d.secondHand?.yesterdaySaleCount ?? 0;
                    monthly[month].secondArea += (d.secondHand?.yesterdaySaleArea ?? 0) / 10000;
                    monthly[month].days++;
                });
                return Object.entries(monthly).map(([month, data]) => ({
                    label: month,
                    newHouseCount: data.count,
                    newHouseArea: Math.round(data.area / 10000 * 100) / 100,
                    secondHandCount: data.secondCount,
                    secondHandArea: Math.round(data.secondArea * 100) / 100
                }));
            } else {
                const yearly = {};
                allData.forEach(d => {
                    const year = d.date.slice(0, 4);
                    if (!yearly[year]) yearly[year] = { count: 0, area: 0, secondCount: 0, secondArea: 0, days: 0 };
                    yearly[year].count += d.newHouse?.todaySignUnits ?? d.newHouse?.todaySaleCount ?? 0;
                    yearly[year].area += d.newHouse?.todaySignArea ?? d.newHouse?.todaySaleArea ?? 0;
                    yearly[year].secondCount += d.secondHand?.yesterdaySaleCount ?? 0;
                    yearly[year].secondArea += (d.secondHand?.yesterdaySaleArea ?? 0) / 10000;
                    yearly[year].days++;
                });
                return Object.entries(yearly).map(([year, data]) => ({
                    label: year,
                    newHouseCount: data.count,
                    newHouseArea: Math.round(data.area / 10000 * 100) / 100,
                    secondHandCount: data.secondCount,
                    secondHandArea: Math.round(data.secondArea * 100) / 100
                }));
            }
        }

        // 更新表格（所有面积取整数）
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const recent = allData.slice(0, 30);
            recent.forEach(d => {
                const tr = document.createElement('tr');
                const nhUnits = d.newHouse?.todaySignUnits ?? d.newHouse?.todaySaleCount ?? 0;
                const nhArea = Math.round(d.newHouse?.todaySignArea ?? d.newHouse?.todaySaleArea ?? 0);
                const shUnits = d.secondHand?.yesterdaySaleCount ?? 0;
                const shArea = Math.round(d.secondHand?.yesterdaySaleArea ?? 0);  // 直接显示㎡，取整数
                const avail = d.newHouse?.availableUnits ?? 0;
                const listing = d.secondHand?.listingCount ?? 0;
                
                tr.innerHTML = `
                    <td>${d.date}</td>
                    <td>${nhUnits.toLocaleString()}</td>
                    <td>${nhArea.toLocaleString()}</td>
                    <td>${avail.toLocaleString()}</td>
                    <td>${shUnits.toLocaleString()}</td>
                    <td>${shArea.toLocaleString()}</td>
                    <td>${listing.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 更新认购公示
        async function updateSubscription() {
            const tbody = document.getElementById('subscriptionBody');
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;">加载中...</td></tr>';
            
            try {
                // 动态计算数据文件路径（适配本地服务器和CloudStudio部署）
                const basePath = window.location.pathname.includes('/dashboard/') ? '../' : './';
                const response = await fetch(basePath + 'data/subscription_data.json?t=' + Date.now());
                if (!response.ok) throw new Error('认购数据加载失败');
                const data = await response.json();
                const subscriptions = data.recentSubscriptions || [];
                
                tbody.innerHTML = '';
                
                if (subscriptions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;">暂无认购公示数据</td></tr>';
                    return;
                }
                
                // 过滤前后10天的认购楼盘
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const tenDaysAgo = new Date(today);
                tenDaysAgo.setDate(tenDaysAgo.getDate() - 10);
                
                const filtered = subscriptions.filter(p => {
                    const startDate = new Date(p['认购开始时间']);
                    return startDate >= tenDaysAgo && startDate <= today;
                });
                
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;">近10天无认购楼盘</td></tr>';
                    return;
                }
                
                // 按开始日期倒序排列（最新的在前）
                filtered.sort((a, b) => {
                    return new Date(b['认购开始时间']) - new Date(a['认购开始时间']);
                });
                
                filtered.forEach(p => {
                    const tr = document.createElement('tr');
                    
                    // 判断状态
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const startDate = new Date(p['认购开始时间']);
                    const endDate = new Date(p['认购结束时间']);
                    let status = '';
                    let statusClass = '';
                    if (today < startDate) {
                        status = '即将开始';
                        statusClass = 'badge-new';
                    } else if (today > endDate) {
                        status = '已结束';
                        statusClass = 'badge-ended';
                    } else {
                        status = '进行中';
                        statusClass = 'badge-ongoing';
                    }
                    
                    tr.innerHTML = `
                        <td>${p['所在区'] || '-'}</td>
                        <td>${p['项目名称'] || '-'}</td>
                        <td>${p['开发企业'] || '-'}</td>
                        <td>${p['认购开始时间'] || '-'}</td>
                        <td>${p['认购结束时间'] || '-'}</td>
                        <td>${p['套数'] ? p['套数'].toLocaleString() : '-'}</td>
                        <td>${p['上市面积'] ? p['上市面积'].toLocaleString() : '-'}</td>
                        <td>${p['备案均价'] ? p['备案均价'].toLocaleString() : '-'}</td>
                        <td><span class="${statusClass}">${status}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
                
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#e53935;">认购数据加载失败：' + e.message + '</td></tr>';
            }
        }

        // 切换视图
        function setView(view) {
            currentView = view;
            document.querySelectorAll('.controls button').forEach((btn, i) => {
                btn.classList.toggle('active', 
                    (i === 0 && view === 'daily') || 
                    (i === 1 && view === 'monthly') || 
                    (i === 2 && view === 'yearly'));
            });
            updateCharts();
        }

        // 初始化
        loadData();
        setInterval(loadData, 30 * 60 * 1000);
    </script>
</body>
</html>
